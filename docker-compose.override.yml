# Dev overrides — auto-merged by `docker compose up`.
# Host port mappings, source bind-mounts (hot reload), and dev-friendly commands.
services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  opensearch:
    ports:
      - "9200:9200"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  ai:
    volumes:
      - ./ai_service:/app
    ports:
      - "8100:8100"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100 --reload

  api:
    build:
      target: dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate --noinput &&
             uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload"

  worker:
    volumes:
      - ./backend:/app
    command: celery -A config worker -l INFO --concurrency 2

  beat:
    volumes:
      - ./backend:/app
    command: celery -A config beat -l INFO
