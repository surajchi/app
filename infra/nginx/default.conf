# Reverse proxy for the `edge` profile (prod-like). Dev hits the API directly on :8000.
upstream finpulse_api {
    server api:8000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # Security headers (TLS/HSTS added at the TLS-terminating layer in prod)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1024;

    location /healthz/ {
        proxy_pass http://finpulse_api;
        access_log off;
    }

    # REST API
    location /api/ {
        proxy_pass http://finpulse_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket gateway (Django Channels — wired in Phase 3)
    location /ws/ {
        proxy_pass http://finpulse_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Django admin + static (admin used by ops only)
    location /django-admin/ {
        proxy_pass http://finpulse_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://finpulse_api;
    }
}
